<section id="formularz">
    <h2>Formularz kontaktowy</h2>

    <form id="contactForm">

        <label>Imię:</label><br>
        <input type="text" id="imie"><br>
        <span class="error" id="errorImie"></span><br>

        <label>Nazwisko:</label><br>
        <input type="text" id="nazwisko"><br>
        <span class="error" id="errorNazwisko"></span><br>

        <label>Email:</label><br>
        <input type="text" id="email"><br>
        <span class="error" id="errorEmail"></span><br>

        <label>Wiadomość:</label><br>
        <textarea id="wiadomosc"></textarea><br>
        <span class="error" id="errorWiadomosc"></span><br><br>

        <button type="submit">Wyślij</button>

    </form>

    <p id="successMessage"></p>
</section>
