<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>CV + Projekt</title>

    <link id="theme" rel="stylesheet" href="green.css">
</head>

<body>

<header>
    <img src="photo.jpg" class="profile">

    <div>
        <h1>Yevhenii Kyryliuk</h1>
        <p>Nr albumu: 66675</p>
    </div>
</header>

<!-- 🔥 MENU -->
<nav>
    <button onclick="scrollToSection('about')">O mnie</button>
    <button onclick="scrollToSection('skills')">Umiejętności</button>
    <button onclick="scrollToSection('projects')">Projekty</button>
    <button onclick="scrollToSection('contact')">Kontakt</button>
</nav>

<hr>

<!-- 🔹 SEKCJE -->
<section id="about">
    <h2>O mnie</h2>
    <p>Jestem studentem zainteresowanym tworzeniem stron internetowych.</p>
</section>

<section id="skills">
    <h2>Umiejętności</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</section>

<section id="projects">
    <h2>Projekty</h2>
    <p>Moje projekty będą tutaj.</p>
</section>

<!-- 🔥 LOCAL STORAGE -->
<section>
    <h2>Moje zadania</h2>

    <input type="text" id="taskInput" placeholder="Dodaj zadanie...">
    <button onclick="addTask()">Dodaj</button>

    <ul id="taskList"></ul>
</section>

<!-- 🔥 FORMULARZ -->
<section id="contact">
    <h2>Kontakt</h2>

    <form onsubmit="return validateForm()">
        <input type="text" id="name" placeholder="Imię" required><br>

        <input type="email" id="email" placeholder="Email" required><br>

        <textarea id="message" placeholder="Wiadomość" required></textarea><br>

        <button type="submit">Wyślij</button>
    </form>

    <p id="formInfo"></p>
</section>

<hr>

<button onclick="setTheme('green')">Zielony</button>
<button onclick="setTheme('red')">Czerwony</button>

<script src="script.js"></script>

</body>
</html>
